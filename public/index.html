<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cli-prompt-cron</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #F8F6F0;
      color: #2C3E50;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 2px solid #4A7FA5;
      padding: 11px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }
    .header-icon { font-size: 20px; line-height: 1; }
    header h1 {
      font-size: 17px;
      font-weight: 700;
      color: #4A7FA5;
      letter-spacing: 0.02em;
    }
    header .subtitle {
      font-size: 11px;
      color: #A0AAB4;
      margin-left: 2px;
    }
    .header-spacer { flex: 1; }
    .live-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #7F8C8D;
    }
    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #27AE60;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: #7F8C8D;
      letter-spacing: 0.06em;
      padding: 10px 16px 6px;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    /* ── Jobs area ── */
    #jobs-area {
      background: #F8F6F0;
      border-bottom: 1px solid #E4DFD6;
      flex-shrink: 0;
    }
    #jobs-scroll {
      display: flex;
      gap: 10px;
      padding: 4px 16px 14px;
      overflow-x: auto;
      scrollbar-width: thin;
    }
    #jobs-scroll::-webkit-scrollbar { height: 4px; }
    #jobs-scroll::-webkit-scrollbar-thumb { background: #D5D8DC; border-radius: 2px; }

    /* Job card */
    .job-card {
      background: #fff;
      border-radius: 12px;
      padding: 12px 15px;
      min-width: 175px;
      max-width: 210px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      flex-shrink: 0;
      border: 1px solid #EAE6DE;
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .job-card:hover {
      box-shadow: 0 4px 14px rgba(74,127,165,0.14);
      transform: translateY(-1px);
    }
    .job-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .status-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.03em;
    }
    .status-active   { background: #D5F0E0; color: #1E8449; }
    .status-inactive { background: #EAECEE; color: #7F8C8D; }
    .job-card-name {
      font-size: 14px;
      font-weight: 600;
      color: #2C3E50;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .job-card-schedule {
      font-size: 13px;
      color: #4A7FA5;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .job-card-next {
      font-size: 11px;
      color: #95A5A6;
    }
    .job-card-next strong { color: #7F8C8D; font-weight: 500; }

    .job-card-actions {
      margin-top: 10px;
    }
    .toggle-btn {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .toggle-btn.stop {
      background: #FADBD8;
      color: #C0392B;
    }
    .toggle-btn.stop:hover {
      background: #F1948A;
      color: #fff;
    }
    .toggle-btn.resume {
      background: #D5F0E0;
      color: #1E8449;
    }
    .toggle-btn.resume:hover {
      background: #82E0AA;
      color: #fff;
    }
    .toggle-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .kill-btn {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #E74C3C;
      color: #fff;
      margin-left: 6px;
      transition: background 0.15s;
    }
    .kill-btn:hover { background: #C0392B; }
    .kill-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .running-badge { background: #FDEBD0; color: #CA6F1E; }

    .no-jobs-card {
      padding: 16px;
      color: #BDC3C7;
      font-size: 13px;
    }

    /* ── Main bottom ── */
    main {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    #bottom {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* ── Log section ── */
    #log-section {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #E4DFD6;
      overflow: hidden;
    }
    #log-pane {
      flex: 1;
      overflow-y: auto;
      padding: 8px 14px 10px;
      background: #FAFAF7;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      font-size: 11.5px;
      line-height: 1.75;
    }
    .log-line {
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-fire   { color: #CA6F1E; }
    .log-exit   { color: #A0AAB4; }
    .log-stdout { color: #2C3E50; }
    .log-stderr { color: #C0392B; }
    .log-daemon { color: #4A7FA5; }

    /* ── Results section ── */
    #results-section {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #results-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 10px 10px;
    }
    .result-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12.5px;
      color: #5D6D7E;
      transition: background 0.15s;
      margin-bottom: 2px;
      line-height: 1.4;
    }
    .result-item:hover { background: #EEF3F8; color: #2C3E50; }
    .result-item.active { background: #D6E8F5; color: #2471A3; }
    .result-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4A7FA5;
      flex-shrink: 0;
      opacity: 0.6;
    }
    .result-item.active .result-dot { opacity: 1; }
    .no-items {
      padding: 16px;
      color: #BDC3C7;
      font-size: 12px;
      text-align: center;
    }

    /* ── Modal ── */
    #result-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(44,62,80,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #result-modal.open { display: flex; }
    #result-modal-inner {
      background: #fff;
      border-radius: 14px;
      width: 82vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    #result-modal-header {
      padding: 13px 18px;
      border-bottom: 1px solid #E4DFD6;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: #F8F6F0;
      border-radius: 14px 14px 0 0;
    }
    #result-modal-title {
      font-size: 13px;
      font-weight: 600;
      color: #2C3E50;
    }
    #result-modal-close {
      background: none;
      border: none;
      color: #7F8C8D;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    #result-modal-close:hover { background: #EEF3F8; color: #2C3E50; }
    #result-modal-body {
      overflow-y: auto;
      padding: 16px 20px;
      flex: 1;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-all;
      color: #2C3E50;
      line-height: 1.85;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D5D8DC; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #AEB6BF; }
  </style>
</head>
<body>

<header>
  <span class="header-icon">🕐</span>
  <h1>cli-prompt-cron</h1>
  <span class="subtitle">AIスケジューラー</span>
  <div class="header-spacer"></div>
  <div class="live-indicator">
    <span class="live-dot"></span>
    <span>ライブ</span>
  </div>
</header>

<main>
  <!-- Jobs -->
  <div id="jobs-area">
    <div class="section-label">📋 スケジュール一覧</div>
    <div id="jobs-scroll">
      <div class="no-jobs-card">読み込み中...</div>
    </div>
  </div>

  <!-- Bottom: Log + Results -->
  <div id="bottom">
    <div id="log-section">
      <div class="section-label">📡 ライブログ</div>
      <div id="log-pane"></div>
    </div>
    <div id="results-section">
      <div class="section-label">📄 実行結果</div>
      <div id="results-list">
        <div class="no-items">読み込み中...</div>
      </div>
    </div>
  </div>
</main>

<!-- Result modal -->
<div id="result-modal">
  <div id="result-modal-inner">
    <div id="result-modal-header">
      <span id="result-modal-title"></span>
      <button id="result-modal-close" title="閉じる">&times;</button>
    </div>
    <pre id="result-modal-body"></pre>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ── XSS escape ── */
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ── Date format ── */
  function fmt(date) {
    if (!date) return '—';
    const d = new Date(date);
    if (isNaN(d)) return '—';
    return d.toLocaleString('ja-JP', {
      month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit',
      hour12: false
    });
  }

  /* ── Relative time ── */
  function relativeTime(date) {
    if (!date) return null;
    const d = new Date(date);
    if (isNaN(d)) return null;
    const diff = d - Date.now();
    if (diff <= 0) return null;
    const mins = Math.floor(diff / 60000);
    if (mins < 60) return `あと ${mins} 分`;
    const hours = Math.floor(diff / 3600000);
    if (hours < 24) return `あと ${hours} 時間`;
    if (hours < 48) return '明日 ' + d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', hour12: false });
    return `あと ${Math.floor(hours / 24)} 日`;
  }

  /* ── Cron humanizer ── */
  function humanizeCron(expr) {
    if (!expr) return expr;
    const p = expr.trim().split(/\s+/);
    if (p.length !== 5) return expr;
    const [min, hour, dom, mon, dow] = p;
    const dowNames = ['日','月','火','水','木','金','土'];

    // */N every-N-minutes
    if (min.startsWith('*/') && hour === '*') {
      return `${min.slice(2)}分ごと`;
    }
    // */N every-N-hours
    if (hour.startsWith('*/') && min === '0') {
      return `${hour.slice(2)}時間ごと`;
    }

    // Time string
    let timeStr = null;
    if (hour !== '*' && min !== '*') {
      if (hour.includes(',')) {
        timeStr = hour.split(',').map(h => `${h.padStart(2,'0')}:${min.padStart(2,'0')}`).join('・');
      } else {
        timeStr = `${hour.padStart(2,'0')}:${min.padStart(2,'0')}`;
      }
    }

    // Day string
    let dayStr = '毎日';
    if (dow !== '*') {
      if (dow === '1-5') { dayStr = '平日（月〜金）'; }
      else if (dow === '0-4') { dayStr = '月〜木'; }
      else {
        const d = parseInt(dow);
        if (!isNaN(d) && d >= 0 && d <= 6) dayStr = `毎週${dowNames[d]}曜`;
        else dayStr = `曜日指定`;
      }
    } else if (dom !== '*') {
      dayStr = `毎月${dom}日`;
    }

    return timeStr ? `${dayStr} ${timeStr}` : expr;
  }

  /* ── Cron next-fire (client-side) ── */
  function parseCronField(field, min, max) {
    const values = new Set();
    for (const part of field.split(',')) {
      const stepSplit = part.split('/');
      const range = stepSplit[0];
      const step = stepSplit[1] ? parseInt(stepSplit[1], 10) : 1;
      let lo = min, hi = max;
      if (range !== '*') {
        const dash = range.split('-');
        lo = parseInt(dash[0], 10);
        hi = dash[1] !== undefined ? parseInt(dash[1], 10) : lo;
      }
      for (let v = lo; v <= hi; v += step) values.add(v);
    }
    return Array.from(values).sort((a, b) => a - b);
  }

  function nextCronFire(cronExpr) {
    try {
      const parts = cronExpr.trim().split(/\s+/);
      if (parts.length !== 5) return null;
      const [mF, hF, domF, monF, dowF] = parts;
      const minutes = parseCronField(mF, 0, 59);
      const hours   = parseCronField(hF, 0, 23);
      const doms    = parseCronField(domF, 1, 31);
      const months  = parseCronField(monF, 1, 12);
      const dows    = parseCronField(dowF, 0, 6);

      const now = new Date();
      now.setSeconds(0, 0);
      now.setMinutes(now.getMinutes() + 1);

      for (let i = 0; i < 366 * 24 * 60; i++) {
        const mo  = now.getMonth() + 1;
        const dom = now.getDate();
        const dow = now.getDay();
        const hr  = now.getHours();
        const mn  = now.getMinutes();

        if (months.includes(mo) &&
            (domF === '*' || doms.includes(dom)) &&
            (dowF === '*' || dows.includes(dow)) &&
            hours.includes(hr) &&
            minutes.includes(mn)) {
          return new Date(now);
        }
        now.setMinutes(now.getMinutes() + 1);
      }
      return null;
    } catch (e) { return null; }
  }

  /* ── Jobs ── */
  function renderJobs(jobs) {
    const scroll = document.getElementById('jobs-scroll');
    if (!jobs || jobs.length === 0) {
      scroll.innerHTML = '<div class="no-jobs-card">ジョブが登録されていません。</div>';
      return;
    }
    scroll.innerHTML = jobs.map(job => {
      const active = job.active !== false;
      const running = job.running === true;
      let badge;
      if (running) {
        badge = '<span class="status-badge running-badge">実行中</span>';
      } else if (active) {
        badge = '<span class="status-badge status-active">稼働中</span>';
      } else {
        badge = '<span class="status-badge status-inactive">停止中</span>';
      }
      const schedule = humanizeCron(job.cron || '');
      const next = active ? nextCronFire(job.cron || '') : null;
      const rel = next ? relativeTime(next) : null;
      const nextLabel = rel ? `<strong>次回:</strong> ${esc(rel)}` : (next ? `<strong>次回:</strong> ${fmt(next)}` : '');
      const btnClass = active ? 'stop' : 'resume';
      const btnLabel = active ? '停止' : '再開';
      const killBtn = running ? `<button class="kill-btn" data-job="${esc(job.name)}">強制停止</button>` : '';
      return `<div class="job-card">
        <div class="job-card-top">${badge}</div>
        <div class="job-card-name" title="${esc(job.name || job.id || '—')}">${esc(job.name || job.id || '—')}</div>
        <div class="job-card-schedule">${esc(schedule)}</div>
        ${nextLabel ? `<div class="job-card-next">${nextLabel}</div>` : ''}
        <div class="job-card-actions">
          <button class="toggle-btn ${btnClass}" data-job="${esc(job.name)}">${btnLabel}</button>${killBtn}
        </div>
      </div>`;
    }).join('');

    scroll.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => toggleJob(btn.dataset.job, btn));
    });
    scroll.querySelectorAll('.kill-btn').forEach(btn => {
      btn.addEventListener('click', () => killProcess(btn.dataset.job, btn));
    });
  }

  async function toggleJob(name, btn) {
    btn.disabled = true;
    try {
      const res = await fetch('/api/jobs/' + encodeURIComponent(name), { method: 'PATCH' });
      if (res.ok) {
        await fetchJobs();
      }
    } catch (_) {}
    btn.disabled = false;
  }

  async function killProcess(name, btn) {
    if (!confirm(`「${name}」の実行中プロセスを強制停止しますか？`)) return;
    btn.disabled = true;
    try {
      const res = await fetch('/api/running/' + encodeURIComponent(name), { method: 'DELETE' });
      if (res.ok) {
        setTimeout(fetchJobs, 1000);
      }
    } catch (_) {}
    btn.disabled = false;
  }

  async function fetchJobs() {
    try {
      const res = await fetch('/api/jobs');
      if (!res.ok) return;
      const data = await res.json();
      renderJobs(Array.isArray(data) ? data : (data.jobs || []));
    } catch (_) {}
  }

  fetchJobs();
  setInterval(fetchJobs, 5000);

  /* ── Live Log (SSE) ── */
  const MAX_LINES = 200;
  const logPane = document.getElementById('log-pane');
  let logLines = 0;

  function classifyLine(text) {
    if (/FIRE/i.test(text))   return 'log-fire';
    if (/EXIT/i.test(text))   return 'log-exit';
    if (/stderr/i.test(text)) return 'log-stderr';
    if (/daemon/i.test(text)) return 'log-daemon';
    return 'log-stdout';
  }

  function appendLog(text) {
    while (logLines >= MAX_LINES && logPane.firstChild) {
      logPane.removeChild(logPane.firstChild);
      logLines--;
    }
    const line = document.createElement('div');
    line.className = 'log-line ' + classifyLine(text);
    line.textContent = text;
    logPane.appendChild(line);
    logLines++;
    logPane.scrollTop = logPane.scrollHeight;
  }

  function connectSSE() {
    const es = new EventSource('/api/logs/stream');
    es.onmessage = e => { if (e.data) appendLog(e.data); };
    es.onerror = () => { es.close(); setTimeout(connectSSE, 3000); };
  }
  connectSSE();

  /* ── Results ── */
  const resultsList = document.getElementById('results-list');
  let activeResultFile = null;

  function renderResults(files) {
    if (!files || files.length === 0) {
      resultsList.innerHTML = '<div class="no-items">実行結果はまだありません。</div>';
      return;
    }
    resultsList.innerHTML = files.map(f => {
      const name = typeof f === 'string' ? f : (f.filename || f.name || JSON.stringify(f));
      const isActive = name === activeResultFile;
      return `<div class="result-item${isActive ? ' active' : ''}" data-file="${esc(name)}">
        <span class="result-dot"></span>${esc(name)}
      </div>`;
    }).join('');
    resultsList.querySelectorAll('.result-item').forEach(el => {
      el.addEventListener('click', () => openResult(el.dataset.file));
    });
  }

  async function fetchResults() {
    try {
      const res = await fetch('/api/results');
      if (!res.ok) return;
      const data = await res.json();
      renderResults(Array.isArray(data) ? data : (data.files || data.results || []));
    } catch (_) {}
  }

  fetchResults();
  setInterval(fetchResults, 10000);

  /* ── Result modal ── */
  const modal      = document.getElementById('result-modal');
  const modalTitle = document.getElementById('result-modal-title');
  const modalBody  = document.getElementById('result-modal-body');
  const modalClose = document.getElementById('result-modal-close');

  async function openResult(filename) {
    activeResultFile = filename;
    resultsList.querySelectorAll('.result-item').forEach(el => {
      el.classList.toggle('active', el.dataset.file === filename);
    });
    try {
      const res  = await fetch('/api/results/' + encodeURIComponent(filename));
      const text = await res.text();
      modalTitle.textContent = filename;
      modalBody.textContent  = text;
      modal.classList.add('open');
    } catch (e) {
      modalTitle.textContent = filename;
      modalBody.textContent  = 'エラー: ' + e.message;
      modal.classList.add('open');
    }
  }

  function closeModal() {
    modal.classList.remove('open');
    activeResultFile = null;
    resultsList.querySelectorAll('.result-item').forEach(el => el.classList.remove('active'));
  }

  modalClose.addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

})();
</script>
</body>
</html>
